<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Sentiment Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/ml5@latest/dist/ml5.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Sentiment Analyzer</h1>
        <p>Type how you're feeling below:</p>
        
        <textarea id="userInput" placeholder="I'm having a fantastic day!"></textarea>
        
        <div class="result-card">
            <div id="status">Loading Model...</div>
            <div class="score-container">
                <span id="sentimentLabel">Neutral</span>
                <div class="gauge">
                    <div id="gaugeFill"></div>
                </div>
                <p>Confidence Score: <span id="scoreValue">0.50</span></p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
